<body class="min-h-screen flex flex-col bg-background text-on-background relative">

</div>
<!-- Top Navigation Bar -->
<nav class="relative z-20 w-full h-16 border-b border-outline-variant bg-surface flex items-center px-xl">

<div class="flex flex-col items-center mb-xl">
<div class="mb-md">

<h1 class="font-headline-xl text-headline-xl text-on-surface tracking-tight">TaskFlow</h1>

</div>
<!-- Central Login Card -->
<div class="bg-surface-container-lowest login-card border border-outline-variant rounded-xl p-xl">
<form action="#" class="space-y-lg" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-sm" for="email">EMAIL ADDRESS</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-md font-body-md text-body-md text-on-surface input-focus-ring transition-all" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-sm" for="password">PASSWORD</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-md font-body-md text-body-md text-on-surface input-focus-ring transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-secondary text-on-secondary font-headline-md text-headline-md py-3 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                        Login
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
{% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <p class="flash-message">{{ msg }}</p>
            {% endfor %}
        {% endif %}
        {% endwith %}
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Dont Have an Account? 
                    <a class="text-secondary font-semibold hover:underline" href="/register">Register</a>
</p>
</div>

<!-- Simple Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const pulse = document.getElementById('bg-pulse');
            let opacity = 0.1;
            let direction = 1;

            setInterval(() => {
                if (opacity >= 0.25) direction = -1;
                if (opacity <= 0.08) direction = 1;
                opacity += 0.002 * direction;
                pulse.style.opacity = opacity;
            }, 50);
        });
    </script>
