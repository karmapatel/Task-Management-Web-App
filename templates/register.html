<!-- Registration Card -->

<!-- Brand Identity -->
<div class="flex flex-col items-center mb-xl">

<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">Create Account</h1>
<!-- <p class="font-body-md text-body-md text-on-surface-variant mt-base">Join TaskFlow and streamline your workflow today.</p> -->
</div>
<!-- Form -->
<form action="#" class="space-y-lg" method="POST">
<!-- Full Name -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-sm" for="email">FULL NAME</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-md font-body-md text-body-md text-on-surface input-focus-ring transition-all" id="full_name" name="full_name" placeholder="Enter your Name" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-sm" for="email">EMAIL ADDRESS</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-md font-body-md text-body-md text-on-surface input-focus-ring transition-all" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-sm" for="password">PASSWORD</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-md font-body-md text-body-md text-on-surface input-focus-ring transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms -->

<!-- Action Button -->
<button class="w-full bg-secondary text-on-secondary font-headline-md text-headline-md py-md px-lg rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-base" type="submit">
                    Create Account
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
{% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <p class="flash-message">{{ msg }}</p>
            {% endfor %}
        {% endif %}
        {% endwith %}
<!-- Social/Divider -->

<!-- Social Actions -->

<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account?

</p>

<script>
        // Micro-interaction for input focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                const icon = input.previousElementSibling;
                if (icon && icon.classList.contains('material-symbols-outlined')) {
                    icon.style.color = '#3B82F6';
                    icon.style.transition = 'color 0.2s ease';
                }
            });
            input.addEventListener('blur', () => {
                const icon = input.previousElementSibling;
                if (icon && icon.classList.contains('material-symbols-outlined')) {
                    icon.style.color = '#76777d';
                }
            });
        });
    </script>
